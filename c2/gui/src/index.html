<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust Remote Admin - C2 Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="app">
    <header>
        <h1 id="title">C2 Dashboard</h1>
    </header>
    <main>
        <!-- Prototype notice banner -->
        <div id="prototype-notice">
            <strong>⚠ Prototype UI</strong> — Command dispatch and live agent monitoring are done
            via the CLI (<code>rust-remote-admin-c2</code> server).
        </div>
        <div class="dashboard-grid">
            <section id="connection">
                <h2 id="conn_title">C2 Server Connection</h2>
                <div class="field-row">
                    <label for="c2-server-address">Server Address:</label>
                    <input type="text" id="c2-server-address" placeholder="e.g. 10.0.0.1:9000">
                    <button id="connect-btn">Connect</button>
                </div>
                <div id="connection-status" class="status-disconnected">Not connected</div>
            </section>
            <section id="controls">
                <h2 id="gen_title">Generate Agent</h2>
                <div class="field-row">
                    <label for="c2-address">C2 Address:</label>
                    <input type="text" id="c2-address" placeholder="e.g. 10.0.0.1:9000">
                </div>
                <div class="field-row">
                    <label for="cert-fingerprint">Cert Fingerprint:</label>
                    <input type="text" id="cert-fingerprint" placeholder="e.g. sha256:abc123...">
                </div>
                <div class="field-row">
                    <label for="agent-id">Agent ID:</label>
                    <input type="number" id="agent-id" value="1" min="1">
                </div>
                <div class="field-row">
                    <label for="count">Count:</label>
                    <input type="number" id="count" value="1" min="1" max="100">
                </div>
                <div class="field-row">
                    <label for="output">Output file:</label>
                    <input type="text" id="output" value="agent.exe">
                </div>
                <div class="field-row">
                    <label for="cert-path">Client cert (PEM):</label>
                    <input type="text" id="cert-path" placeholder="Optional path to client cert">
                </div>
                <div class="field-row">
                    <label for="key-path">Client key (PEM):</label>
                    <input type="text" id="key-path" placeholder="Optional path to client key">
                </div>
                <button id="generate-btn">Generate Agent</button>
                <div id="gen-result" class="result-area"></div>
            </section>
            <section id="status">
                <h2 id="connected_agents">Connected Agents</h2>
                <ul id="client-list"></ul>
                <div style="margin-top: 10px">
                    <input type="text" id="add-agent-id" placeholder="Agent ID">
                    <button id="submit-btn">Add Agent</button>
                </div>
            </section>
            <section id="logs">
                <h2 id="live_logs">Live Logs</h2>
                <div id="log-container"></div>
            </section>
        </div>
    </main>
    <script type="module">
        const { invoke } = window.__TAURI__;

        async function loadLocale() {
            const response = await fetch('./locales/en.json');
            return await response.json();
        }

        let t = {};

        async function init() {
            t = await loadLocale();
            document.getElementById('title').textContent = t.title || 'C2 Dashboard';
            document.getElementById('gen_title').textContent = 'Generate Agent';
            document.getElementById('connected_agents').textContent = t.connected_agents || 'Connected Agents';
            document.getElementById('live_logs').textContent = t.live_logs || 'Live Logs';
            updateList();

            const listen = window.__TAURI__?.event?.listen;
            if (typeof listen === 'function') {
                await listen('log-update', () => updateLogs());
            } else {
                setInterval(updateLogs, 2000);
            }
            await updateLogs();
        }

        async function updateList() {
            const clients = await invoke('get_clients');
            const list = document.getElementById('client-list');
            list.innerHTML = '';
            clients.forEach(id => {
                const li = document.createElement('li');
                li.textContent = `Agent: ${id}`;
                list.appendChild(li);
            });
        }

        async function updateLogs() {
            const logs = await invoke('get_logs');
            const container = document.getElementById('log-container');
            container.innerHTML = '';
            logs.forEach(msg => {
                const div = document.createElement('div');
                div.textContent = `> ${msg}`;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            });
        }

        document.getElementById('submit-btn').addEventListener('click', async () => {
            const id = document.getElementById('add-agent-id').value;
            if (id) {
                await invoke('add_client', { id });
                updateList();
                updateLogs();
                document.getElementById('add-agent-id').value = '';
            }
        });

        document.getElementById('generate-btn').addEventListener('click', async () => {
            const btn = document.getElementById('generate-btn');
            const result = document.getElementById('gen-result');
            btn.disabled = true;
            btn.textContent = 'Generating...';
            result.textContent = '';

            try {
                const res = await invoke('generate_agent', {
                    c2Address: document.getElementById('c2-address').value,
                    certFingerprint: document.getElementById('cert-fingerprint').value,
                    agentId: parseInt(document.getElementById('agent-id').value) || 1,
                    output: document.getElementById('output').value || 'agent.exe',
                    count: parseInt(document.getElementById('count').value) || 1,
                    certPath: document.getElementById('cert-path').value || null,
                    keyPath: document.getElementById('key-path').value || null,
                });

                if (res.success) {
                    result.className = 'result-area success';
                    result.textContent = `✓ ${res.message}`;
                } else {
                    result.className = 'result-area error';
                    result.textContent = `✗ ${res.message}`;
                }
                updateLogs();
            } catch (err) {
                result.className = 'result-area error';
                result.textContent = `✗ ${err}`;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Generate Agent';
            }
        });

        init();

        // Connection UI
        const connectBtn = document.getElementById('connect-btn');
        const serverAddress = document.getElementById('c2-server-address');
        const connStatus = document.getElementById('connection-status');

        connectBtn.addEventListener('click', async () => {
            const address = serverAddress.value.trim();
            if (!address) return;

            connectBtn.disabled = true;
            connectBtn.textContent = 'Connecting...';

            try {
                const res = await invoke('connect_to_c2', { address });
                if (res.success) {
                    connStatus.className = 'status-connected';
                    connStatus.textContent = `✓ Connected to ${address}`;
                    serverAddress.disabled = true;
                } else {
                    connStatus.className = 'status-disconnected';
                    connStatus.textContent = `✗ ${res.message}`;
                }
                updateLogs();
            } catch (err) {
                connStatus.className = 'status-disconnected';
                connStatus.textContent = `✗ ${err}`;
            } finally {
                connectBtn.disabled = false;
                connectBtn.textContent = 'Connect';
            }
        });
    </script>
</body>
</html>
