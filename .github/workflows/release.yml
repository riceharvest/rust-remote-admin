name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - name: Install MinGW
        run: sudo apt-get update && sudo apt-get install -y mingw-w64
      - name: Build Windows binaries
        run: cargo build --release --target x86_64-pc-windows-gnu -p c2-core -p agent-core
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            target/x86_64-pc-windows-gnu/release/rust-remote-admin-c2.exe
            target/x86_64-pc-windows-gnu/release/rust-remote-admin-agent.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dev deps (for GUI)
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev
      - name: Build Linux binaries
        run: cargo build --release -p c2-core -p agent-core
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            target/release/rust-remote-admin-c2
            target/release/rust-remote-admin-agent

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: windows-binaries
          path: windows/
      - uses: actions/download-artifact@v4
        with:
          name: linux-binaries
          path: linux/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/rust-remote-admin-c2.exe
            windows/rust-remote-admin-agent.exe
            linux/rust-remote-admin-c2
            linux/rust-remote-admin-agent
          body: |
            **Two components — C2 control binary + agent template.**

            **Usage:**
            1. Download `rust-remote-admin-c2` (or `.exe`) for your platform
            2. Download `rust-remote-admin-agent` (or `.exe`) — the template
            3. Generate a configured agent:
               ```
               ./rust-remote-admin-c2 generate-agent \
                 --template rust-remote-admin-agent.exe \
                 --c2-address <C2_IP>:9000 \
                 --cert-fingerprint <TLS_HASH> \
                 --agent-id 1 \
                 --output client.exe
               ```
            4. Start the C2 server:
               ```
               ./rust-remote-admin-c2 server 0.0.0.0:9000
               ```

            No external dependencies required.
